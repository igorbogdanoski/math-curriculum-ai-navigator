  <!--
    Dedicated blank landing page for MSAL.js popup auth (services/cloudImport/msalClient.ts).
    MSAL's opener-side code detects the popup navigating to this exact redirectUri and extracts
    the auth response directly from the URL — this page's own content never needs to run any
    MSAL code itself. Deliberately NOT the SPA root: if the popup landed on the app's own
    HashRouter root, the auth response's URL hash (#code=...&client_info=...) would collide with
    the app's own hash-based routing and re-trigger the full app bootstrap inside the popup,
    which is exactly what caused an `interaction_in_progress` MSAL error in practice. Same
    root-cause class as the old OneDrive.js v7.2 picker needing its own dedicated redirect page.
  -->
</body>
