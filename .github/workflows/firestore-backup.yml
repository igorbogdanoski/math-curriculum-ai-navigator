name: Firestore Nightly Backup

# Runs every day at 02:00 UTC (04:00 MK time — low-traffic window)
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  backup:
    name: Export Firestore → Cloud Storage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Firestore Export
        run: |
          DATE=$(date +%Y-%m-%d)
          PROJECT="${{ secrets.VITE_FIREBASE_PROJECT_ID }}"
          BUCKET="gs://${PROJECT}-backups/firestore/${DATE}"

          echo "Exporting Firestore to ${BUCKET} ..."

          gcloud firestore export "${BUCKET}" \
            --project="${PROJECT}" \
            --async

          echo "### Firestore Backup" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: ${DATE}" >> $GITHUB_STEP_SUMMARY
          echo "- **Destination**: \`${BUCKET}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: \`${PROJECT}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Export initiated (async)" >> $GITHUB_STEP_SUMMARY

      # Keep only last 30 daily backups — delete older ones to save storage costs
      - name: Prune old backups (keep 30 days)
        run: |
          PROJECT="${{ secrets.VITE_FIREBASE_PROJECT_ID }}"
          BUCKET="gs://${PROJECT}-backups/firestore"
          CUTOFF=$(date -d '30 days ago' +%Y-%m-%d)

          echo "Pruning backups older than ${CUTOFF} ..."

          # List all backup folders and delete those older than cutoff
          gsutil ls "${BUCKET}/" 2>/dev/null | while read folder; do
            # Extract date from path like gs://…/firestore/2025-12-01/
            folder_date=$(basename "${folder%/}")
            if [[ "${folder_date}" < "${CUTOFF}" ]]; then
              echo "Deleting old backup: ${folder}"
              gsutil -m rm -r "${folder}" || true
            fi
          done
        continue-on-error: true
