name: Firestore Nightly Backup

# Runs every day at 02:00 UTC (04:00 MK time — low-traffic window)
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

# Opt-in to Node 24 runner so the deprecated-Node-20 warning goes away.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backup:
    name: Export Firestore → Cloud Storage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required secrets
        run: |
          missing=0
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "::error::Missing secret FIREBASE_SERVICE_ACCOUNT"
            missing=1
          fi
          if [ -z "${{ secrets.VITE_FIREBASE_PROJECT_ID }}" ]; then
            echo "::error::Missing secret VITE_FIREBASE_PROJECT_ID"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "All required secrets are present."

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure backup bucket exists
        run: |
          PROJECT="${{ secrets.VITE_FIREBASE_PROJECT_ID }}"
          BUCKET="gs://${PROJECT}-backups"
          if gsutil ls -b "${BUCKET}" >/dev/null 2>&1; then
            echo "Bucket ${BUCKET} already exists."
          else
            echo "Creating bucket ${BUCKET} (multi-region EU, Standard)..."
            gsutil mb -p "${PROJECT}" -c STANDARD -l EU -b on "${BUCKET}"
          fi

      - name: Run Firestore Export
        run: |
          set -euo pipefail
          DATE=$(date +%Y-%m-%d)
          PROJECT="${{ secrets.VITE_FIREBASE_PROJECT_ID }}"
          BUCKET="gs://${PROJECT}-backups/firestore/${DATE}"

          echo "Exporting Firestore to ${BUCKET} ..."

          gcloud firestore export "${BUCKET}" \
            --project="${PROJECT}" \
            --async

          echo "### Firestore Backup" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: ${DATE}" >> $GITHUB_STEP_SUMMARY
          echo "- **Destination**: \`${BUCKET}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: \`${PROJECT}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Export initiated (async)" >> $GITHUB_STEP_SUMMARY

      # Keep only last 30 daily backups — delete older ones to save storage costs
      - name: Prune old backups (keep 30 days)
        run: |
          PROJECT="${{ secrets.VITE_FIREBASE_PROJECT_ID }}"
          BUCKET="gs://${PROJECT}-backups/firestore"
          CUTOFF=$(date -d '30 days ago' +%Y-%m-%d)

          echo "Pruning backups older than ${CUTOFF} ..."

          # List all backup folders and delete those older than cutoff
          gsutil ls "${BUCKET}/" 2>/dev/null | while read folder; do
            # Extract date from path like gs://…/firestore/2025-12-01/
            folder_date=$(basename "${folder%/}")
            if [[ "${folder_date}" < "${CUTOFF}" ]]; then
              echo "Deleting old backup: ${folder}"
              gsutil -m rm -r "${folder}" || true
            fi
          done
        continue-on-error: true
