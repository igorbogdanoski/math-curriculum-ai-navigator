name: Firestore Restore Drill

on:
  workflow_dispatch:
    inputs:
      source_project_id:
        description: "Source project ID that owns the backup bucket"
        required: true
        type: string
      restore_project_id:
        description: "Target project ID for restore drill (recommended isolated project)"
        required: true
        type: string
      backup_date:
        description: "Backup date folder (YYYY-MM-DD)"
        required: true
        type: string

jobs:
  restore-drill:
    name: Import Firestore Backup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Trigger Firestore import (async)
        id: import
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_PROJECT="${{ github.event.inputs.source_project_id }}"
          RESTORE_PROJECT="${{ github.event.inputs.restore_project_id }}"
          BACKUP_DATE="${{ github.event.inputs.backup_date }}"

          BACKUP_PATH="gs://${SOURCE_PROJECT}-backups/firestore/${BACKUP_DATE}"

          echo "Restore drill source backup: ${BACKUP_PATH}"
          echo "Restore drill target project: ${RESTORE_PROJECT}"

          OPERATION_NAME=$(gcloud firestore import "${BACKUP_PATH}" \
            --project="${RESTORE_PROJECT}" \
            --async \
            --format='value(name)')

          if [[ -z "${OPERATION_NAME}" ]]; then
            echo "Failed to get Firestore import operation name." >&2
            exit 1
          fi

          echo "operation_name=${OPERATION_NAME}" >> "$GITHUB_OUTPUT"
          echo "backup_path=${BACKUP_PATH}" >> "$GITHUB_OUTPUT"

      - name: Summarize restore drill
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Firestore Restore Drill
          - **Source backup**: `${{ steps.import.outputs.backup_path }}`
          - **Restore project**: `${{ github.event.inputs.restore_project_id }}`
          - **Operation**: `${{ steps.import.outputs.operation_name }}`
          - **Status**: Import initiated (async).

          Use this command to inspect operation status:
          `gcloud firestore operations describe ${{ steps.import.outputs.operation_name }} --project=${{ github.event.inputs.restore_project_id }}`
          EOF

  # N2 restore drill gate - 2026-04-04
