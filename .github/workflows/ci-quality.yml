name: CI Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  quality-gate:
    name: Typecheck + Unit + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (critical vulnerabilities)
        run: npm audit --audit-level=critical

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: |
          npm run -s test || (
            echo "Unit tests failed on first attempt. Retrying once..." &&
            npm run -s test
          )
        env:
          VITE_FIREBASE_API_KEY: dummy-key
          VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: dummy-project
          VITE_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000"
          VITE_GEMINI_API_KEY: dummy-gemini-key

      - name: Build (stub env)
        run: npm run -s build
        env:
          VITE_FIREBASE_API_KEY: dummy-key
          VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: dummy-project
          VITE_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000"
          VITE_GEMINI_API_KEY: dummy-gemini-key

      - name: Enforce performance budget
        run: |
          if [ -f scripts/enforce-perf-budget.mjs ]; then
            npm run -s perf:budget
          else
            echo "Skip perf:budget (scripts/enforce-perf-budget.mjs not present in this branch)."
          fi

      - name: Backup readiness check
        run: |
          if [ -f scripts/check-backup-readiness.mjs ]; then
            npm run -s backup:readiness-check
          else
            echo "Skip backup:readiness-check (scripts/check-backup-readiness.mjs not present in this branch)."
          fi

      - name: Eval golden-set schema validation
        run: |
          if [ -f scripts/run-eval.mjs ]; then
            npm run -s eval:validate-schema
          else
            echo "Skip eval:validate-schema (scripts/run-eval.mjs not present in this branch)."
          fi

      - name: Eval quality smoke gate
        run: |
          if [ -f scripts/run-eval.mjs ] && [ -f eval/sample-outputs.json ]; then
            npm run -s eval:smoke-gate
          else
            echo "Skip eval:smoke-gate (required eval assets not present in this branch)."
          fi

      - name: Prompt registry drift check
        run: |
          if [ -f scripts/hash-prompts.mjs ]; then
            npm run -s prompts:check
          else
            echo "Skip prompts:check (scripts/hash-prompts.mjs not present in this branch)."
          fi

  reliability-baseline:
    name: Reliability Baseline (last 20 runs)
    runs-on: ubuntu-latest
    if: always()
    needs: [quality-gate]
    env:
      CURRENT_QUALITY_GATE_RESULT: ${{ needs.quality-gate.result }}

    steps:
      - name: Compute rolling pass rate
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowId = 'ci-quality.yml';
            const currentResult = process.env.CURRENT_QUALITY_GATE_RESULT;
            const qualityGateJobName = 'Typecheck + Unit + Build';
            const isCurrentEligible = context.eventName === 'push' && context.ref === 'refs/heads/main';

            const runsResp = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowId,
              per_page: 100,
              status: 'completed',
              event: 'push',
              branch: 'main',
            });

            // IMPORTANT: Use QUALITY-GATE JOB conclusions from previous runs, not workflow conclusion.
            // Otherwise the metric self-locks because this reliability job intentionally fails the workflow.
            const previousCompleted = [];
            for (const run of runsResp.data.workflow_runs) {
              if (run.id === context.runId) continue;
              if (previousCompleted.length >= 19) break;

              try {
                const jobsResp = await github.rest.actions.listJobsForWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                  per_page: 100,
                });

                const qualityGateJob = jobsResp.data.jobs.find((j) => j.name === qualityGateJobName);
                const conclusion = qualityGateJob?.conclusion;
                if (conclusion === 'success' || conclusion === 'failure') {
                  previousCompleted.push({ conclusion });
                }
              } catch (e) {
                core.warning(`Could not inspect jobs for run ${run.id}; skipping.`);
              }
            }

            const completed = [];

            if (isCurrentEligible && (currentResult === 'success' || currentResult === 'failure')) {
              completed.push({ conclusion: currentResult });
            }

            completed.push(...previousCompleted);

            const total = completed.length;
            const success = completed.filter((r) => r.conclusion === 'success').length;
            const passRate = total === 0 ? 0 : (success / total) * 100;
            const threshold = 95;
            const targetSuccessesAt20 = Math.ceil((threshold / 100) * 20); // 19
            const minConsecutiveNeeded = Math.max(0, targetSuccessesAt20 - success);
            const closed = total >= 20 && passRate >= threshold;

            // Worst-case estimate if upcoming successful runs push out existing successes from the window.
            // We can compute this from the current ordered window: [current run, previous runs...].
            const maxExtraNeeded = (() => {
              if (total < 20) return minConsecutiveNeeded;
              let successInWindow = completed.filter((r) => r.conclusion === 'success').length;
              const window = [...completed.slice(0, 20)];
              let added = 0;
              while (successInWindow < targetSuccessesAt20 && added < 200) {
                const dropped = window.pop();
                if (dropped?.conclusion === 'success') successInWindow -= 1;
                window.unshift({ conclusion: 'success' });
                successInWindow += 1;
                added += 1;
              }
              return added;
            })();

            const trajectory = minConsecutiveNeeded === maxExtraNeeded
              ? `${minConsecutiveNeeded}`
              : `${minConsecutiveNeeded}-${maxExtraNeeded}`;

            core.summary
              .addHeading('CI Reliability Baseline')
              .addRaw(`Basis: '${qualityGateJobName}' job conclusions (not workflow conclusion)\n\n`)
              .addRaw(`Included runs: push events on main branch\n\n`)
              .addRaw(`Window: last ${total} completed runs\n\n`)
              .addRaw(`Success: ${success}/${total}\n\n`)
              .addRaw(`Pass rate: ${passRate.toFixed(2)}%\n\n`)
              .addRaw(`Target: >= ${threshold}%\n\n`)
              .addRaw(`Remaining consecutive successes (est.): ${trajectory}\n\n`)
              .addRaw(closed
                ? 'A4 close trigger: ✅ reached (>=95% over last 20 completed runs)'
                : 'A4 close trigger: ⏳ pending (needs >=95% over last 20 completed runs)')
              .write();

            if (closed) {
              core.notice(`A4 close trigger reached: ${success}/20 (${passRate.toFixed(2)}%).`);
            } else {
              core.notice(`A4 in progress: ${success}/${total}, pass ${passRate.toFixed(2)}%, remaining consecutive estimate ${trajectory}.`);
            }

            if (total >= 10 && passRate < threshold) {
              core.setFailed(`CI pass rate ${passRate.toFixed(2)}% is below ${threshold}% over the last ${total} runs.`);
            }

  incident-observability-summary:
    name: Incident Observability Summary (Sentry)
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'pull_request'
    needs: [quality-gate]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Generate incident summary
        run: |
          if [ -z "${SENTRY_AUTH_TOKEN}" ] || [ -z "${SENTRY_ORG}" ] || [ -z "${SENTRY_PROJECT}" ]; then
            echo "Skip obs:incident-summary (missing Sentry secrets)."
            exit 0
          fi
          if [ -f scripts/sentry-incident-summary.mjs ]; then
            npm run -s obs:incident-summary
          else
            echo "Skip obs:incident-summary (scripts/sentry-incident-summary.mjs not present in this branch)."
          fi
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_STATS_PERIOD: 14d
          SENTRY_ISSUE_QUERY: is:unresolved
          SENTRY_UNCLASSIFIED_WARN_PCT: "30"

  a11y-axe:
    name: Accessibility (axe-core)
    runs-on: ubuntu-latest
    needs: [quality-gate]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run axe a11y smoke tests
        run: npx playwright test tests/a11y-smoke.spec.ts --reporter=list
        env:
          VITE_FIREBASE_API_KEY: dummy-key
          VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: dummy-project
          VITE_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000"
          VITE_GEMINI_API_KEY: dummy-gemini-key

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-axe-report
          path: playwright-report/
          retention-days: 7

  e2e-emulator-smoke:
    name: E2E Auth Smoke (Firebase Emulator)
    runs-on: ubuntu-latest
    needs: [quality-gate]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firebase Emulators and run E2E smoke tests
        run: |
          firebase emulators:exec \
            --only auth,firestore \
            --project demo-e2e \
            "npx playwright test tests/emulator-smoke.spec.ts --reporter=list"
        env:
          VITE_FIREBASE_API_KEY: emulator-test-key
          VITE_FIREBASE_AUTH_DOMAIN: demo-e2e.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: demo-e2e
          VITE_FIREBASE_STORAGE_BUCKET: demo-e2e.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000"
          VITE_GEMINI_API_KEY: dummy-gemini-key
          VITE_USE_FIREBASE_EMULATOR: "true"
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          FIRESTORE_EMULATOR_HOST: localhost:8080

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-emulator-report
          path: playwright-report/
          retention-days: 7
